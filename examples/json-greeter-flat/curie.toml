# json-greeter-flat
#
# Demonstrates the flat-package source layout with a Jackson dependency:
#
#   src/com.example/JsonGreeter.java   — production source
#
# The Jackson dependency version is pinned directly in [dependencies].

[application]
name = "json-greeter-flat"
version = "0.1.0"
mainClass = "com.example.JsonGreeter"

[java]
sourceCompatibility = "21"

[dependencies]
"com.fasterxml.jackson.core:jackson-databind" = "2.17.2"

[docker]
baseImage = "eclipse-temurin:21-jre-alpine"
