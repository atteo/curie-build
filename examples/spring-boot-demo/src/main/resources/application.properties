# ── Datasource ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/demo
spring.datasource.username=demo
spring.datasource.password=demo

# Apply schema.sql on every startup (suitable for dev/demo; use Flyway in prod)
spring.sql.init.mode=always

# ── Spring Data JDBC ──────────────────────────────────────────────────────────
# Disable JPA auto-configuration (we're using Spring Data JDBC, not JPA)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# ── Micrometer ────────────────────────────────────────────────────────────────
# Tag every metric with the application name for Prometheus/Grafana dashboards
management.metrics.tags.application=${spring.application.name:spring-boot-demo}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.springframework.jdbc=DEBUG
