# Examples workspace.
#
# Each member directory is an independent Curie project (application or
# library) with its own Curie.toml.
#
# Workspace-level config (below) is inherited by every member:
#   - [java] sourceCompatibility is the default for members that don't
#     declare their own.
#   - [bom-imports] / [test-bom-imports] are merged with each member's
#     own BOM imports; member entries take precedence on a name collision.
#
# The pairs `<name>` / `maven-<name>` demonstrate the two source layouts
# (flat-package vs Maven src/main/java/) side by side.

[workspace]
members = [
    "hello-world",
    "jackson-bom-greeter",
    "json-greeter",
    "string-utils",
    "string-utils-cli",
    "auto-value-demo",
    "lombok-greeter",
    "maven-hello-world",
    "maven-jackson-bom-greeter",
    "maven-json-greeter",
    "maven-string-utils",
    "hello-kotlin",
    "hello-mixed",
    "graalvm-hello",
]

[java]
sourceCompatibility = "21"

[bom-imports]
"com.fasterxml.jackson:jackson-bom" = "2.17.2"

[test-bom-imports]
"org.junit:junit-bom" = "5.11.0"

# Workspace-level defaults for the two tool versions that Curie downloads.
# Every member inherits these unless it declares its own [test] or [kotlin].
[test]
junitPlatformVersion = "6.0.3"

[kotlin]
version = "2.1.21"
